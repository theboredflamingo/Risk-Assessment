name: Daily Model Run Test

on:
  workflow_dispatch: 
  schedule:
    - cron: "50 10 * * 1-5"  # 4:00 PM IST (UTC 10:30) hmm try
         # Allow manual trigger
  # 🔥 REQUIRED to push back to repo

permissions:
  contents: write  # Allow pushing changes back to the repository

jobs:
  run-model-again:
    runs-on: ubuntu-latest

    env:
      MODEL_FILE: dailym.pkl
      LOG_FILE: run_log.txt

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Run your pipeline
      - name: Run model pipeline
        run: python main.py

      # 5. Commit & push updates
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git checkout master

          git pull --rebase origin master

          git add dailym.pkl run_log.txt

          git diff --cached --quiet || git commit -m "Auto update model + logs"

          # 🔑 Ensure authenticated remote
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          # Push with retry
          git push origin master || (
            git pull --rebase origin master &&
            git push origin master
          )